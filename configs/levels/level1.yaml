# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  RDMCA · LEVEL 1 — Preescolar (preschool)                                  ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  The most basic base. Like a small child: a tiny vocabulary, short simple  ║
# ║  sentences, can hold a basic conversation, and does very basic arithmetic  ║
# ║  (counting and single-digit + / −). Trains in minutes–hours on a laptop.   ║
# ║                                                                            ║
# ║  A level's SIZE is dictated by the INFORMATION it must learn, not by the   ║
# ║  hardware. The hardware only limits how high a level you can run (see the  ║
# ║  resource guard in src/resources.py).                                      ║
# ╚══════════════════════════════════════════════════════════════════════════╝

level: 1                       # level number (1..5). Selected with `--level 1`.
name: "Preescolar"             # human grade name, shown by the startup announce.
tier: edge                     # informational tag (edge = runs on a laptop)
# Inherits configs/levels/_base.yaml (backend, skip_gate, shared training/model knobs,
# moe, curriculum stage structure). Only level-1 DIFFS are below.

# What the model learns at this level — printed by the resource 'announce' so
# you always know what areas the base is being taught.
information:
  summary: "Conversación muy básica, vocabulario de niño pequeño y aritmética simple (contar, +/− de un dígito)."
  areas:                       # keyed by stage number (only active stages)
    1: "Lenguaje: palabras y frases cortas, diálogo simple — puede conversar."
    2: "Patrones: secuencias y analogías muy simples (esto va con esto)."
    3: "Aritmética: contar y sumar/restar números de un solo dígito."
    4: "Causalidad: causa→efecto muy simple (esto pasó porque…)."
    5: "Razonamiento: pensar paso a paso (cadena de pensamiento) antes de responder."
    6: "Memoria: recordar un hecho simple dado en el contexto y usarlo."
    7: "Ética/BCF: nociones muy básicas de bien/mal (probe pequeño)."

# ── Model — dimensioned to the information above (tiny). ──────────────────────
model:
  d_model: 256                 # hidden width — wide enough for coherent simple conversation.
  n_layers: 6                  # transformer blocks (depth). L1 (Preescolar) is the LIGHT
                               # variant of the d_model=256 tier: capacity was never L1's
                               # bottleneck (data/training was), so 6 layers (~8.4M, weight-
                               # tied) keeps it fast. L2 (Primaria) carries the tier's full
                               # 8-layer spec (~10.5M), so the ladder grows L1<L2.
  n_heads: 4                   # head_dim = d_model/n_heads = 64 (≥64 ⇒ usable attention
                               # resolution + enough RoPE freq pairs; 8 heads gave 32).
  n_kv_heads: 2                # GQA: 2 KV heads → KV cache 2× smaller (scales with level).
  ffn_dim: 1024                # SwiGLU inner dim (≈4·d_model).
  context_len: 512             # 256 truncated ~63% of TinyStories mid-story; 512 lets
                               # the model see complete short stories + multi-turn chats.
  vocab_size: 8192             # child vocabulary, richer than a toy (tokenizer trained to this).
  mrl_dims: [128, 256]         # Matryoshka prefix dims used by the MRL loss.
  dropout: 0.05
  # MTP/PLE size-scaling knobs (rope_theta, mtp_loss_weight, ple_gated are in _base.yaml).
  n_mtp_heads: 1               # auxiliary future-token heads (denser training signal)
  mtp_hidden_dim: 128          # head inner width (≈ d_model/2)
  ple_dim: 32                  # per-layer token-identity lookup width (≈ d_model/8)
  languages: ["en"]            # config-driven languages (edit to add "es").

# ── Training hyperparameters (only level-1 diffs; precision/grad_accumulation/
#    clip_grad_norm are in _base.yaml). ────────────────────────────────────────────────
training:
  lr: 3.0e-4                   # validated across transformer scales (Chinchilla, GPT-2, Pythia)
  lr_min: 5.0e-5
  weight_decay: 0.01             # 0.1 shrinks params to 30% norm over 24k steps; 0.01 is standard for <100M
  batch_size: 16               # big batch fits easily at this size.
  warmup_steps: 500             # 2.0% of schedule (was 0.82%) — safer warmup→cosine transition
  save_every: 500
  eval_every: 500              # finer val sampling → the anti-divergence best-checkpoint
                              # (restored at stage end) is well-sampled on short stages.
  max_corpus_passes: 4         # cap re-reads of a small corpus (anti-overfit). If the
                               # corpus × this < n_tokens, the stage stops here (default 3).
  rehearsal_fraction: 0.15     # global fallback for stages with no STAGE_REHEARSAL default.

# ── Resource estimates (documented; the live guard recomputes from `model`). ──
# These are reference figures so you can compare levels at a glance. The actual
# go/no-go decision is made at runtime by src/resources.py against real free RAM.
resources:
  est_params_m: 10             # ≈ millions of parameters (live count ≈ 10.5M).
  est_train_mem_gb: 0.6        # ≈ peak training memory.
  est_infer_mem_gb: 0.2        # ≈ inference memory.
  min_ram_gb: 3                # informational minimum to run comfortably.

# ── Curriculum — per-stage DATA only (stage name + entry_level come from _base.yaml;
#    each stage owns its data folder in models/<model>/stageNN_<slug>/data/level{L}/).
#    `sources` = where the data comes from; `filter` caps complexity (null = none).
#    See scripts/prepare_data.py. ───────────────────────────────────────────────────────
curriculum:
  stage1:
    n_tokens: 200_000_000      # ~19× tokens/params — the run plateaued at ~80M on the
                               # OLD narrow data; broader data + more tokens is what
                               # makes L1 actually usable (its whole purpose as a base).
    data:
      # RICH but BASIC variety — the four registers a usable base needs:
      #   tinystories      → simple narrative / literature (grammar, story flow)
      #   dialogue         → conversation: mood-BALANCED empathetic (capped per emotion)
      #                      + general chit-chat (SODA) + DialogSum + OASST, round-robin
      #                      interleaved so no single tone dominates (see graded.py)
      #   instruct         → answer-a-request directly (short Alpaca Q&A)
      #   simple_wikipedia → factual/expository, plain language (world-knowledge vocab)
      # Variety of REGISTER + topic — not just more tokens — is what lets a tiny
      # model converse and understand rather than only be grammatical.
      #   definitions      → graded dictionary: word MEANINGS as statements + Q&A
      #                      ("what is a car?") so the base UNDERSTANDS words, not
      #                      just predicts them; the word bank grows per level.
      #   basic_chat       → clean, short, COHERENT everyday exchanges (greet /
      #                      how-are-you / identity / simple facts / politeness) — the
      #                      high-frequency conversation a base must nail to feel
      #                      fluent; low-entropy, so it also pulls perplexity DOWN.
      #   grammar          → grammar RULES + word USAGE (parts of speech, a/an, plurals,
      #                      verb tense, comparatives, adjective placement, sentence
      #                      composition, synonyms/antonyms) — so the base learns HOW
      #                      language works (rules applied across many words), not just
      #                      vocabulary. Compositional → generalizes, doesn't memorize.
      sources: [tinystories, dialogue, instruct, simple_wikipedia, definitions, basic_chat, grammar]
      # PER-SOURCE token budgets (M) — the lever for the MIX. A tiny preschool base
      # learns to CONVERSE first, so conversation/instruction/clean-core lead and
      # narrative is supporting (not half the corpus). Curated clean sources get a
      # controlled, meaningful share here (cycled), then are oversampled at train time.
      source_budgets_m: {dialogue: 70, tinystories: 30, instruct: 50,
                         simple_wikipedia: 25, definitions: 6, basic_chat: 6, grammar: 10}
      # Train-time oversampling on top of the written mix. Spend gradient where loss
      # actually lives: dialogue/instruct are the HARD, high-entropy registers (measured
      # masked val ppl ~24 / ~72) and carry the conversational goal, so they lead. The
      # templated anchors (basic_chat, definitions) are already ~solved (ppl ~1.2) —
      # heavy oversampling there just re-memorizes them and starves the hard sources, so
      # they keep only a light presence as a fluency/grounding floor.
      source_weights: {dialogue: 3.0, instruct: 3.0, simple_wikipedia: 1.5,
                       basic_chat: 1.5, definitions: 1.5, grammar: 2.0}
      filter:
        # Flesch-Kincaid grade ceiling, applied to PROSE sources (tinystories,
        # simple_wikipedia). MEASURED: grade≤4 kept only 0.6% of Simple Wikipedia,
        # grade≤7 ~11%, grade≤10 ~33%. grade≤4 left the base ~97% narrative+chat with
        # almost no factual register. grade≤7 restores ~18× more factual prose while
        # staying ACCESSIBLE for an 11M model (grade≤10 prose is harder → higher loss
        # with little gain at this size). Word-meaning grounding comes mainly from the
        # curated `definitions` source; wiki adds usage-in-context breadth.
        max_grade: 7
        max_word_len: 16
  stage2:
    n_tokens: 20_000_000
    data:
      sources: [analogies]       # synthetic simple analogies/sequences.
      filter: null               # already simple by construction.
  stage3:
    n_tokens: 30_000_000
    data:
      sources: [arithmetic]
      filter:
        arithmetic_level: 1        # 1 = single-digit + / − only (e.g. "3 + 4 = 7").
  stage4:
    n_tokens: 15_000_000
    data:
      sources: [causal_synth]  # synthetic cause→effect (e-CARE), simple by construction.
      filter: null
  stage8:
    n_tokens: 200_000_000         # was 20M — 1.9 tok/param was severely under-budgeted; 200M ≈ 19 tok/param
    data:
      sources: [agentic]       # real tool-use loop (Claude-style JSON Action/Observation).
      filter: null             # JSON tool transcripts — appropriate by construction.
  stage9:
    n_tokens: 15_000_000
    data:
      sources: [mcp]           # real tool use re-serialized into MCP (JSON-RPC 2.0).
      filter: null
  stage10:
    n_tokens: 15_000_000
    data:
      sources: [skills]        # real procedures (Super-NaturalInstructions) as SKILL.md.
      filter: null
  stage5:
    n_tokens: 25_000_000
    data:
      sources: [reasoning]     # CoT (GSM8K) + planificación y uso de tools (sesiones multi-paso) en <think>…</think>.
      filter: null
  stage6:
    n_tokens: 15_000_000
    data:
      sources: [memory]        # synthetic recall/use-of-memory: relevant facts + distractors.
      filter: null
  stage7:
    n_tokens: 10_000_000
    data:
      sources: [ethics]
      filter: null

# moe + skip_gate + shared training/model knobs are inherited from _base.yaml.
