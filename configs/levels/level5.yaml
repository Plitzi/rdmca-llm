# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  RDMCA · LEVEL 5 — Universidad (university)                                ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  Everything, with NO complexity filters: full Wikipedia, competition math  ║
# ║  (MATH), full causal + procedural reasoning, and ethics. Specialized       ║
# ║  hardware (multi-GPU / large VRAM). Defaults to the torch/CUDA backend.    ║
# ║                                                                            ║
# ║  Data lives under data/level5/stageN (same per-level layout as L0-L4),     ║
# ║  holding the FULL unfiltered corpora. Run prepare_data.py --level 5.        ║
# ╚══════════════════════════════════════════════════════════════════════════╝

level: 5
name: "Universidad"
backend: torch                 # multi-GPU / large-VRAM CUDA
tier: cluster

information:
  summary: "Todo sin filtros: lenguaje completo, matemáticas de competición, razonamiento causal/procedural y ética completos."
  areas:
    1: "Lenguaje: Wikipedia completo, sin filtrar."
    2: "Patrones: ARC completo (Easy + Challenge)."
    3: "Matemáticas: aritmética + GSM8K + matemáticas de competición (MATH)."
    4: "Causal/Procedural: corpus causal completo."
    5: "Razonamiento: cadena de pensamiento sobre todo el conocimiento adquirido."
    6: "Memoria: gestión de memoria a gran escala (relevancia entre mucho ruido)."
    7: "Ética: corpus de ética + sondas BCF completas — aquí se congela la base."

model:
  d_model: 768
  n_layers: 16
  n_heads: 12                  # head_dim = 64
  n_kv_heads: 4                # GQA: 4 KV heads → KV cache 3× smaller (biggest payoff at scale).
  ffn_dim: 3072
  context_len: 3328            # Fibonacci ladder L1→L5: 512, 768, 1280, 2048, 3328.
  vocab_size: 32768
  mrl_dims: [256, 512, 768]
  dropout: 0.1
  rope_theta: 10000.0
  # MTP (multi-token prediction) + PLE (per-layer embeddings): perf knobs present at
  # EVERY level — the function is uniform, only the size scales (like n_kv_heads), so
  # the identical-structure principle holds. Deepest stack ⇒ 2 MTP heads, widest PLE.
  n_mtp_heads: 2               # auxiliary future-token heads (denser training signal)
  mtp_hidden_dim: 384          # head inner width (≈ d_model/2)
  mtp_loss_weight: 0.3         # weight of each MTP head's CE in the loss
  ple_dim: 96                  # per-layer token-identity lookup width (≈ d_model/8)
  ple_gated: true              # sigmoid-gated identity↔context merge
  # Recompute block activations in backward (5-10× less activation memory for ~20-30%
  # more compute) — essential for this 16-layer / 3328-ctx model. Safe here: torch
  # preserves the RNG, so dropout stays correct under recompute.
  gradient_checkpointing: true
  languages: ["en"]

training:
  precision: bf16
  lr: 3.0e-4
  lr_min: 3.0e-5
  weight_decay: 0.1
  batch_size: 8
  grad_accumulation: 16
  # 8-bit AdamW states (bitsandbytes, CUDA) — a further memory cut below the bf16
  # states this bf16 model already keeps. Opt-in: needs `pip install bitsandbytes`
  # on the CUDA box; falls back to bf16-AdamW with a warning if unavailable.
  optimizer_states: int8
  warmup_steps: 2000
  save_every: 5000
  eval_every: 10000
  clip_grad_norm: 1.0

resources:
  est_params_m: 201            # live count ≈ 201.4M
  est_train_mem_gb: 24
  est_infer_mem_gb: 3
  min_vram_gb: 40

gate:
  max_perplexity: {1: 40.0, 2: 38.0, 3: 36.0, 4: 34.0, 5: 32.0, 6: 34.0, 7: 34.0}

# At level 5 every stage is active and data is the FULL unfiltered corpus
# (filter: null), under the per-level data/level5/stageN dirs like every level.
curriculum:
  stage1:
    name: "Language and communication"
    entry_level: 1
    n_tokens: 1_500_000_000
    data_dir: "data/level5/stage1"
    data: {sources: [wikipedia], filter: null}        # null filter = everything.
  stage2:
    name: "Perception and pattern recognition"
    entry_level: 1
    n_tokens: 500_000_000
    data_dir: "data/level5/stage2"
    data: {sources: [wikipedia, arc_easy, arc_challenge], filter: null}
  stage3:
    name: "Abstraction and symbolic composition"
    entry_level: 1
    n_tokens: 1_000_000_000
    data_dir: "data/level5/stage3"
    data: {sources: [wikipedia, arithmetic, gsm8k, math], filter: null}
  stage4:
    name: "Causal and procedural reasoning"
    entry_level: 1                     # present from L1 (uniform structure); graded by level.
    n_tokens: 1_000_000_000
    data_dir: "data/level5/stage4"
    data: {sources: [wikipedia, causal_synth], filter: null}
  stage6:
    name: "Memory management"
    entry_level: 1             # memory is a cognitive faculty: the frozen core learns
                               # to recall and USE injected memory (LTSS + episodic).
    n_tokens: 1_000_000_000
    data_dir: "data/level5/stage6"
    data:
      sources: [memory]        # synthetic recall/use-of-memory: relevant facts + distractors.
      filter: null
  stage7:
    name: "Cognitive ethics and BCF"
    entry_level: 1                     # core freezes after stage 7 (BCF) at every level (uniform).
    n_tokens: 500_000_000
    data_dir: "data/level5/stage7"
    data: {sources: [wikipedia, ethics], filter: null}
  stage8:
    name: "Action and tool use"
    entry_level: 0
    n_tokens: 100_000_000
    data_dir: "data/level5/stage8"
    data: {sources: [agentic], filter: null}   # real tool-use loop (Claude-style JSON)
  stage9:
    name: "Model Context Protocol (MCP)"
    entry_level: 0
    n_tokens: 100_000_000
    data_dir: "data/level5/stage9"
    data: {sources: [mcp], filter: null}       # real tool use over MCP (JSON-RPC 2.0)
  stage10:
    name: "Skills"
    entry_level: 0
    n_tokens: 100_000_000
    data_dir: "data/level5/stage10"
    data: {sources: [skills], filter: null}    # real procedures as Claude-style SKILL.md
  stage5:
    name: "Reasoning"
    entry_level: 0
    n_tokens: 100_000_000
    data_dir: "data/level5/stage5"
    data: {sources: [reasoning], filter: null}  # CoT (GSM8K) + planning & tool use (multi-step) in <think>…</think>
