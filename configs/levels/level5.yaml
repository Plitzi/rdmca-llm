# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  RDMCA · LEVEL 5 — Universidad (university)                                ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  Everything, with NO complexity filters: full Wikipedia, competition math  ║
# ║  (MATH), full causal + procedural reasoning, and ethics. Specialized       ║
# ║  hardware (multi-GPU / large VRAM). Defaults to the torch/CUDA backend.    ║
# ║                                                                            ║
# ║  Data lives under data/level5/stageN (same per-level layout as L0-L4),     ║
# ║  holding the FULL unfiltered corpora. Run prepare_data.py --level 5.        ║
# ╚══════════════════════════════════════════════════════════════════════════╝

level: 5
name: "Universidad"
backend: torch                 # multi-GPU / large-VRAM CUDA
tier: cluster

information:
  summary: "Todo sin filtros: lenguaje completo, matemáticas de competición, razonamiento causal/procedural y ética completos."
  areas:
    1: "Lenguaje: Wikipedia completo, sin filtrar."
    2: "Patrones: ARC completo (Easy + Challenge)."
    3: "Matemáticas: aritmética + GSM8K + matemáticas de competición (MATH)."
    4: "Causal/Procedural: corpus causal completo."
    5: "Ética: corpus de ética + sondas BCF completas."

model:
  d_model: 768
  n_layers: 16
  n_heads: 12                  # head_dim = 64
  ffn_dim: 3072
  context_len: 2048
  vocab_size: 32768
  mrl_dims: [256, 512, 768]
  dropout: 0.1
  rope_theta: 10000.0
  languages: ["en"]

training:
  precision: bf16
  lr: 3.0e-4
  lr_min: 3.0e-5
  weight_decay: 0.1
  batch_size: 8
  grad_accumulation: 16
  warmup_steps: 2000
  save_every: 5000
  eval_every: 10000
  clip_grad_norm: 1.0

resources:
  est_params_m: 201            # live count ≈ 201.4M
  est_train_mem_gb: 24
  est_infer_mem_gb: 3
  min_vram_gb: 40

skip_gate: false
gate:
  max_perplexity: {1: 40.0, 2: 38.0, 3: 36.0, 4: 34.0, 5: 32.0}

# At level 5 every stage is active and data is the FULL unfiltered corpus
# (filter: null), under the per-level data/level5/stageN dirs like every level.
curriculum:
  stage1:
    name: "Language and communication"
    entry_level: 1
    n_tokens: 1_500_000_000
    data_dir: "data/level5/stage1"
    data: {sources: [wikipedia], filter: null}        # null filter = everything.
  stage2:
    name: "Perception and pattern recognition"
    entry_level: 1
    n_tokens: 500_000_000
    data_dir: "data/level5/stage2"
    data: {sources: [wikipedia, arc_easy, arc_challenge], filter: null}
  stage3:
    name: "Abstraction and symbolic composition"
    entry_level: 1
    n_tokens: 1_000_000_000
    data_dir: "data/level5/stage3"
    data: {sources: [wikipedia, arithmetic, gsm8k, math], filter: null}
  stage4:
    name: "Causal and procedural reasoning"
    entry_level: 3
    n_tokens: 1_000_000_000
    data_dir: "data/level5/stage4"
    data: {sources: [wikipedia, causal_synth], filter: null}
  stage5:
    name: "Cognitive ethics and BCF"
    entry_level: 4
    n_tokens: 500_000_000
    data_dir: "data/level5/stage5"
    data: {sources: [wikipedia, ethics], filter: null}
  stage6:
    name: "Action and tool use"
    entry_level: 0
    n_tokens: 100_000_000
    data_dir: "data/level5/stage6"
    data: {sources: [agentic], filter: null}   # real tool-use loop (Claude-style JSON)
  stage7:
    name: "Model Context Protocol (MCP)"
    entry_level: 0
    n_tokens: 100_000_000
    data_dir: "data/level5/stage7"
    data: {sources: [mcp], filter: null}       # real tool use over MCP (JSON-RPC 2.0)
  stage8:
    name: "Skills"
    entry_level: 0
    n_tokens: 100_000_000
    data_dir: "data/level5/stage8"
    data: {sources: [skills], filter: null}    # real procedures as Claude-style SKILL.md
  stage9:
    name: "Reasoning"
    entry_level: 0
    n_tokens: 100_000_000
    data_dir: "data/level5/stage9"
    data: {sources: [reasoning], filter: null}  # real CoT (GSM8K) as <think>…</think> + answer

# ── Mixture-of-Experts sobre los sectores cognitivos (post-congelado) ─────────
# Como el cerebro, no todos los sectores se activan por token: el gate elige los
# top_k sectores más relevantes (S1..S6) y SOLO esos computan, así el cómputo
# activo queda acotado aunque el pool de sectores crezca (equipos pequeños siguen
# corriéndolo). S7 (Conductual/BCF) NO es experto: queda siempre activo y aislado.
moe:
  enabled: true            # enruta los sectores con MoE en consolidación/inferencia
  experts: 6               # sectores expertos enrutados (S1..S6)
  top_k: 2                 # sectores activados por token (sparsity tipo cerebro)
  aux_loss_weight: 0.01    # peso del aux loss de balanceo de expertos
  capacity_factor: 1.25    # slack de capacidad por experto (dispatch estático MLX)
