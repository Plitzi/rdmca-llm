# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  RDMCA · LEVEL 2 — Primaria (primary school)   [default level]             ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  Full sentences and short paragraphs, a wider everyday vocabulary, two-    ║
# ║  digit arithmetic (+ − ×) and simple patterns. Reasonable first "real"     ║
# ║  model on a laptop. Size follows the information, not the hardware.        ║
# ╚══════════════════════════════════════════════════════════════════════════╝

level: 2
name: "Primaria"
backend: mlx                   # mlx | torch
tier: edge

information:
  summary: "Frases y párrafos, vocabulario cotidiano más amplio, aritmética de dos dígitos y patrones simples."
  areas:
    1: "Lenguaje: oraciones y párrafos, vocabulario cotidiano; conversa con más fluidez."
    2: "Patrones: analogías y secuencias con más variedad."
    3: "Aritmética: +, −, × de dos dígitos."
    4: "Causalidad: causa→efecto y procedimientos simples."
    5: "Razonamiento: pensar paso a paso (cadena de pensamiento) antes de responder."
    6: "Memoria: usar hechos recuperados e ignorar distractores simples."
    7: "Ética/BCF: nociones de bien/mal aplicadas a situaciones simples."

model:
  d_model: 256                 # same 256 tier as L1, but L2 is the FULL 8-layer tier spec.
  n_layers: 8                  # 8 = paper's spec for the d_model=256 tier (~10.5M tied). L1 is
                               # the lighter 6-layer variant (~8.4M), so the ladder grows L1<L2.
  n_heads: 4                   # head_dim = 64 (was 32 with 8 heads)
  n_kv_heads: 2                # GQA: KV cache 2× smaller.
  ffn_dim: 1024
  context_len: 768             # Fibonacci ladder L1→L5: 512, 768, 1280, 2048, 3328
                               # (cada nivel = suma de los dos anteriores).
  vocab_size: 8192
  mrl_dims: [128, 256]
  dropout: 0.1
  rope_theta: 10000.0
  languages: ["en"]

training:
  precision: bf16
  lr: 4.0e-4
  lr_min: 4.0e-5
  weight_decay: 0.1
  batch_size: 12
  grad_accumulation: 4
  warmup_steps: 500
  save_every: 1000
  eval_every: 2000
  clip_grad_norm: 1.0

resources:
  est_params_m: 11             # live count ≈ 10.5M
  est_train_mem_gb: 0.5
  est_infer_mem_gb: 0.1
  min_ram_gb: 4

skip_gate: false               # graduation gate active from primaria upward.
gate:
  max_perplexity: {1: 50.0, 2: 48.0, 3: 45.0, 4: 45.0, 5: 45.0, 6: 45.0, 7: 45.0}

curriculum:
  stage1:
    name: "Language and communication"
    entry_level: 1
    n_tokens: 300_000_000      # > L1 (200M): primaria is a higher grade than preescolar
    data_dir: "data/level2/stage1"
    data:
      sources: [simple_wikipedia, dialogue]   # Simple-English Wikipedia + synthetic dialogue.
      filter:
        max_grade: 5               # ~10-year-old reading level.
        max_word_len: 16
  stage2:
    name: "Perception and pattern recognition"
    entry_level: 1
    n_tokens: 25_000_000
    data_dir: "data/level2/stage2"
    data:
      sources: [analogies]
      filter: null
  stage3:
    name: "Abstraction and symbolic composition"
    entry_level: 1
    n_tokens: 45_000_000
    data_dir: "data/level2/stage3"
    data:
      sources: [arithmetic]
      filter:
        arithmetic_level: 2        # 2 = two-digit + − × (e.g. "23 + 18 = 41").
  stage4:
    name: "Causal and procedural reasoning"
    entry_level: 1
    n_tokens: 25_000_000
    data_dir: "data/level2/stage4"
    data:
      sources: [causal_synth]
      filter: null
  stage8:
    name: "Action and tool use"
    entry_level: 0
    n_tokens: 25_000_000
    data_dir: "data/level2/stage8"
    data:
      sources: [agentic]       # real tool-use loop (Claude-style JSON Action/Observation).
      filter: null
  stage9:
    name: "Model Context Protocol (MCP)"
    entry_level: 0
    n_tokens: 18_000_000
    data_dir: "data/level2/stage9"
    data:
      sources: [mcp]           # real tool use re-serialized into MCP (JSON-RPC 2.0).
      filter: null
  stage10:
    name: "Skills"
    entry_level: 0
    n_tokens: 18_000_000
    data_dir: "data/level2/stage10"
    data:
      sources: [skills]        # real procedures (Super-NaturalInstructions) as SKILL.md.
      filter: null
  stage5:
    name: "Reasoning"
    entry_level: 0             # cadena-de-pensamiento desde el inicio; mejora con el tamaño.
    n_tokens: 35_000_000
    data_dir: "data/level2/stage5"
    data:
      sources: [reasoning]     # CoT (GSM8K) + planificación y uso de tools (sesiones multi-paso) en <think>…</think>.
      filter: null
  stage6:
    name: "Memory management"
    entry_level: 1             # memory is a cognitive faculty: the frozen core learns
                               # to recall and USE injected memory (LTSS + episodic).
    n_tokens: 25_000_000
    data_dir: "data/level2/stage6"
    data:
      sources: [memory]        # synthetic recall/use-of-memory: relevant facts + distractors.
      filter: null
  stage7:
    name: "Cognitive ethics and BCF"
    entry_level: 1             # core freezes after stage 7 (BCF) at every level (uniform).
    n_tokens: 15_000_000
    data_dir: "data/level2/stage7"
    data:
      sources: [ethics]
      filter: null

# ── Mixture-of-Experts sobre los sectores cognitivos (post-congelado) ─────────
# Como el cerebro, no todos los sectores se activan por token: el gate elige los
# top_k sectores más relevantes (S1..S6) y SOLO esos computan, así el cómputo
# activo queda acotado aunque el pool de sectores crezca (equipos pequeños siguen
# corriéndolo). S7 (Conductual/BCF) NO es experto: queda siempre activo y aislado.
moe:
  enabled: true            # enruta los sectores con MoE en consolidación/inferencia
  experts: 6               # sectores expertos enrutados (S1..S6)
  top_k: 2                 # sectores activados por token (sparsity tipo cerebro)
  aux_loss_weight: 0.01    # peso del aux loss de balanceo de expertos
  capacity_factor: 1.25    # slack de capacidad por experto (dispatch estático MLX)
