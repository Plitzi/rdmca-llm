# RDMCA T2 Edge — MacBook M2 Max 64GB
# d_model=256, bilingual EN+ES
# vocab_size=65536 per Implementation Guide §7.7 (multilingual)

model:
  d_model: 256
  n_layers: 8
  n_heads: 4
  ffn_dim: 1024
  context_len: 1024 # 2048
  vocab_size: 65536
  mrl_dims: [64, 128, 256]
  dropout: 0.1
  rope_theta: 10000.0
  dtype: bfloat16        # bf16 compute: ~20x faster, ~4x less memory vs fp32
  languages: ["en", "es"]

training:
  lr: 3.0e-4
  lr_min: 3.0e-5
  weight_decay: 0.1
  batch_size: 8
  grad_accumulation: 4
  warmup_steps: 2000
  save_every: 5000
  eval_every: 10000
  clip_grad_norm: 1.0

curriculum:
  stage1:
    name: "Language and communication"
    n_tokens: 1_500_000_000
    data_dir: "data/stage1_language"
  stage2:
    name: "Perception and pattern recognition"
    n_tokens: 500_000_000
    data_dir: "data/stage2_patterns"
  stage3:
    name: "Abstraction and symbolic composition"
    n_tokens: 1_000_000_000
    data_dir: "data/stage3_abstraction"
  stage4:
    name: "Causal and procedural reasoning"
    n_tokens: 1_000_000_000
    data_dir: "data/stage4_causal"
  stage5:
    name: "Cognitive ethics and BCF"
    n_tokens: 500_000_000
    data_dir: "data/stage5_ethics"
