# ── RDMCA profile: NANO ──────────────────────────────────────────────────────
# Goal: your FIRST chatable model, fast, on a MacBook (Apple Silicon).
# Trains to basic EN/ES coherence in a few hours; checkpointing lets you stop
# any time and chat with the latest checkpoint.
#
# Target hardware: MacBook M2/M3 (16–64 GB) · Apple MLX
# Tokenizer:       train a 16k vocab first (fast):
#                  python scripts/train_tokenizer.py --vocab_size 16000 --sample_mb 200
# Train:           python train_stage.py --profile nano --stage 1
# Chat:            python chat.py --profile nano --stage 1
profile: nano
tier: dev                     # inference + light consolidation
backend: mlx                  # mlx | torch  (torch backend not implemented yet)
notes: "Fast first model. vocab_size is overridden by the trained tokenizer."

model:
  d_model: 384
  n_layers: 6
  n_heads: 6                  # head_dim = 64
  ffn_dim: 1536
  context_len: 512
  vocab_size: 16000           # nominal; tokenizer_info.json overrides at load
  mrl_dims: [128, 256, 384]
  dropout: 0.1
  rope_theta: 10000.0
  languages: ["en", "es"]

training:
  precision: bf16             # fp32 | bf16 | fp16
  lr: 3.0e-4
  lr_min: 3.0e-5
  weight_decay: 0.1
  batch_size: 16
  grad_accumulation: 2
  warmup_steps: 200
  save_every: 1000
  eval_every: 2000
  clip_grad_norm: 1.0

# Proxy perplexity gates (real benchmarks replace these later).
gate:
  max_perplexity: {1: 60.0, 2: 55.0, 3: 50.0, 4: 48.0, 5: 45.0}

# Small budgets so a first model is reachable. Stop early and chat any time.
curriculum:
  stage1: {name: "Language and communication",          n_tokens: 500_000_000, data_dir: "data/stage1_language"}
  stage2: {name: "Perception and pattern recognition",  n_tokens: 150_000_000, data_dir: "data/stage2_patterns"}
  stage3: {name: "Abstraction and symbolic composition", n_tokens: 200_000_000, data_dir: "data/stage3_abstraction"}
  stage4: {name: "Causal and procedural reasoning",      n_tokens: 200_000_000, data_dir: "data/stage4_causal"}
  stage5: {name: "Cognitive ethics and BCF",             n_tokens: 150_000_000, data_dir: "data/stage5_ethics"}
