# ── RDMCA profile: M2MAX ─────────────────────────────────────────────────────
# Goal: your "real" first model on a MacBook M2/M3 Max with 64 GB unified memory.
# Stronger than nano (d_model=512); full bilingual vocab. Days, not hours.
#
# Target hardware: MacBook M2 Max / M3 Max, 64 GB · Apple MLX
# Tokenizer:       python scripts/train_tokenizer.py --vocab_size 65536 --sample_mb 500
# Train:           python train_stage.py --profile m2max --stage 1   (then 2..5)
# Chat:            python chat.py --profile m2max --stage 1
profile: m2max
tier: T3                       # full inference + daily consolidation
backend: mlx                   # mlx | torch  (torch backend not implemented yet)
notes: "Balanced for 64 GB unified memory. ~120M params at d_model=512."

model:
  d_model: 512
  n_layers: 10
  n_heads: 8                   # head_dim = 64
  ffn_dim: 2048
  context_len: 1024
  vocab_size: 65536
  mrl_dims: [128, 256, 512]
  dropout: 0.1
  rope_theta: 10000.0
  languages: ["en", "es"]

training:
  precision: bf16              # fp32 | bf16 | fp16
  lr: 3.0e-4
  lr_min: 3.0e-5
  weight_decay: 0.1
  batch_size: 8
  grad_accumulation: 8         # effective batch 64
  warmup_steps: 2000
  save_every: 5000
  eval_every: 10000
  clip_grad_norm: 1.0

gate:
  max_perplexity: {1: 45.0, 2: 42.0, 3: 38.0, 4: 36.0, 5: 34.0}

curriculum:
  stage1: {name: "Language and communication",          n_tokens: 1_500_000_000, data_dir: "data/stage1_language"}
  stage2: {name: "Perception and pattern recognition",  n_tokens: 500_000_000,   data_dir: "data/stage2_patterns"}
  stage3: {name: "Abstraction and symbolic composition", n_tokens: 1_000_000_000, data_dir: "data/stage3_abstraction"}
  stage4: {name: "Causal and procedural reasoning",      n_tokens: 1_000_000_000, data_dir: "data/stage4_causal"}
  stage5: {name: "Cognitive ethics and BCF",             n_tokens: 500_000_000,   data_dir: "data/stage5_ethics"}
