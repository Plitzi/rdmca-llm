# ── RDMCA profile: TEST ──────────────────────────────────────────────────────
# Goal: exercise the WHOLE real pipeline end-to-end in ~10 minutes, with the
# same code path as a real run — just less data and a smaller model.
# This replaces the old "toy" path: there is no synthetic corpus and no special
# code branch. You use real data, capped with `prepare_data --limit`.
#
# Quick run:
#   python scripts/prepare_data.py --profile test --stage 1 --limit 50
#   python scripts/train_tokenizer.py --profile test --vocab_size 8000 --sample_mb 20
#   python train_stage.py --profile test --stage 1
#   python chat.py --profile test --stage 1
profile: test
tier: dev
backend: mlx                    # mlx | torch  (torch backend not implemented yet)
notes: "Pipeline smoke test on real data. Weights are not production-quality."

skip_gate: true                 # don't require the graduation gate on a test run

model:
  d_model: 256
  n_layers: 4
  n_heads: 4                    # head_dim = 64
  ffn_dim: 1024
  context_len: 256
  vocab_size: 8000              # nominal; tokenizer_info.json overrides at load
  mrl_dims: [64, 128, 256]
  dropout: 0.1
  rope_theta: 10000.0
  languages: ["en", "es"]       # ← edit this to change the language selection

training:
  precision: bf16     # fast + stable for smoke tests (fp16 also works but can NaN without loss-scaling)
  lr: 3.0e-4
  lr_min: 3.0e-5
  weight_decay: 0.1
  batch_size: 4
  grad_accumulation: 2
  warmup_steps: 50
  save_every: 200
  eval_every: 500
  clip_grad_norm: 1.0

# Lax proxy gates — not enforced because skip_gate is true, kept for reference.
gate:
  max_perplexity: {1: 1000.0, 2: 1000.0, 3: 1000.0, 4: 1000.0, 5: 1000.0}

# For a pure offline smoke test every stage points at the Stage-1 corpus, so
# the whole 5-stage → freeze → consolidation flow runs without downloading the
# per-stage datasets. For a real run, use the nano/m2max profiles + prepare_data.
curriculum:
  stage1: {name: "Language and communication",           n_tokens: 500_000, data_dir: "data/stage1_language"}
  stage2: {name: "Perception and pattern recognition",   n_tokens: 200_000, data_dir: "data/stage1_language"}
  stage3: {name: "Abstraction and symbolic composition", n_tokens: 200_000, data_dir: "data/stage1_language"}
  stage4: {name: "Causal and procedural reasoning",      n_tokens: 200_000, data_dir: "data/stage1_language"}
  stage5: {name: "Cognitive ethics and BCF",             n_tokens: 200_000, data_dir: "data/stage1_language"}
