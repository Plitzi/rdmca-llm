# ── RDMCA profile: A100 ──────────────────────────────────────────────────────
# Goal: a strong reference model on a single datacenter GPU (A100 40/80 GB).
# Note: PyTorch/CUDA backend is NOT yet implemented in this repo (MLX only).
# This profile defines the target architecture/budget; run on Apple Silicon via
# MLX for now, or port the train loop to PyTorch for CUDA. See docs.
#
# Target hardware: 1× A100 40–80 GB (CUDA)
# Tokenizer:       python scripts/train_tokenizer.py --vocab_size 65536 --sample_mb 1000
profile: a100
tier: T3
notes: "~250M params at d_model=768. Requires a CUDA train loop (not yet in repo)."

model:
  d_model: 768
  n_layers: 12
  n_heads: 12                  # head_dim = 64
  ffn_dim: 3072
  context_len: 2048
  vocab_size: 65536
  mrl_dims: [256, 512, 768]
  dropout: 0.1
  rope_theta: 10000.0
  languages: ["en", "es"]

training:
  lr: 2.5e-4
  lr_min: 2.5e-5
  weight_decay: 0.1
  batch_size: 32
  grad_accumulation: 4
  warmup_steps: 4000
  save_every: 5000
  eval_every: 10000
  clip_grad_norm: 1.0

gate:
  max_perplexity: {1: 35.0, 2: 32.0, 3: 28.0, 4: 26.0, 5: 24.0}

curriculum:
  stage1: {name: "Language and communication",          n_tokens: 3_000_000_000, data_dir: "data/stage1_language"}
  stage2: {name: "Perception and pattern recognition",  n_tokens: 1_000_000_000, data_dir: "data/stage2_patterns"}
  stage3: {name: "Abstraction and symbolic composition", n_tokens: 2_000_000_000, data_dir: "data/stage3_abstraction"}
  stage4: {name: "Causal and procedural reasoning",      n_tokens: 2_000_000_000, data_dir: "data/stage4_causal"}
  stage5: {name: "Cognitive ethics and BCF",             n_tokens: 1_000_000_000, data_dir: "data/stage5_ethics"}
