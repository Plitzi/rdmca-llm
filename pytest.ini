[pytest]
# Pin collection to this repo so sibling projects are never collected.
# FRAMEWORK tests live under src/ (src/tests/); each MODEL's tests live with the model
# (models/<model>/.../tests/ — stage plugins and uses/). No root tests/ dir: framework
# and model tests never share a folder.
testpaths = src models
# importlib mode gives each test file a unique module path, so identically
# named test files in sibling projects can never shadow this repo's tests.
addopts = -ra --import-mode=importlib
