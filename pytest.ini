[pytest]
# Pin collection to this repo's tests so sibling projects are never collected.
# Cross-cutting tests live in tests/; each stage plugin keeps its OWN tests under
# src/models/<model>/stageNN_<slug>/tests/ (collected here too).
testpaths = tests src/models
# importlib mode gives each test file a unique module path, so identically
# named test files in sibling projects can never shadow this repo's tests.
addopts = -ra --import-mode=importlib
